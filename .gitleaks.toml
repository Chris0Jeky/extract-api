# gitleaks configuration for extract-api.
#
# Extends the default ruleset (every built-in secret rule still runs). The only
# customization is a COMMIT-scoped allowlist for one historical commit (e327e0e),
# whose revision of tests/test_agent_hooks.py carried key-shaped redaction-test
# fixtures. That commit was superseded by ad3c140, which assembles the fixtures by
# concatenation so no contiguous secret literal is committed. Scoping the allowlist
# to that single commit (not the file path) means a real secret added to that test
# file in any NEW commit is still caught.
title = "extract-api gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "One historical commit's pre-concatenation redaction-test fixtures (fake keys)."
commits = ["e327e0ef86770dad3e1ac77f0a4ed1ef739508dc"]
