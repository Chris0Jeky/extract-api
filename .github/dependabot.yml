version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: deps
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-all:
        update-types: [major, minor, patch]
    commit-message:
      prefix: deps(actions)
